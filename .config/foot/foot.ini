# -*- conf -*-
term=foot
font=IosevkaTerm Nerd Font:size=16
box-drawings-uses-font-glyphs=yes
notify=notify-send -a ${app-id} -i ${app-id} ${title} ${body}
bold-text-in-bright=no
[environment]
[bell]
[scrollback]
[url]
launch=xdg-open ${url}
[cursor]
style=underline
[mouse]
hide-when-typing=yes
[touch]
[colors]
background=282828
foreground=ebdbb2
regular0=282828
regular1=cc241d
regular2=98971a
regular3=d79921
regular4=458588
regular5=b16286
regular6=689d6a
regular7=a89984
bright0=928374
bright1=fb4934
bright2=b8bb26
bright3=fabd2f
bright4=83a598
bright5=d3869b
bright6=8ec07c
bright7=ebdbb2
[csd]
# preferred=none
size=36
font=Cantarell
color=ff2f3132
hide-when-maximized=yes
double-click-to-maximize=yes
button-width=36
button-color=ffFFFFFF
button-minimize-color=ff444647
button-maximize-color=ff444647
button-close-color=ff444647
[key-bindings]
scrollback-up-half-page=Control+k
scrollback-down-half-page=Control+j
clipboard-copy=Control+Shift+c XF86Copy
clipboard-paste=Control+Shift+v XF86Paste
font-increase=Control+plus Control+equal Control+KP_Add
font-decrease=Control+minus Control+KP_Subtract
font-reset=Control+0 Control+KP_0
spawn-terminal=Control+Shift+n
[search-bindings]
[url-bindings]
[text-bindings]
[mouse-bindings]
select-begin=BTN_LEFT
# vim: ft=dosini
