import = [ "~/.config/alacritty/hybrid-alacritty/hybrid.toml" ]

[env]
TERM = "xterm-256color"

[window]
dynamic_title = true
decorations = "full"
opacity = 1.00

[mouse]
hide_when_typing = true
bindings = [
{ mouse = "Right", mods = "Control", action = "Paste" },
]

[[hints.enabled]]
command = "xdg-open"
hyperlinks = true
post_processing = true
regex = "(ipfs:|ipns:|magnet:|mailto:|gemini:|gopher:|https:|http:|news:|file:|git:|ssh:|ftp:)[^\u0000-\u001F\u007F-<>\"\\s{-}\\^⟨⟩`]+"

[hints.enabled.mouse]
enabled = true
mods = "None"

[font.glyph_offset]
x = 0
y = 0

[font]
size = 15.0
builtin_box_drawing = false

[font.offset]
x = 0
y = 0

[font.normal]
family = "IosevkaTerm NF"
style = "Regular"

[cursor]
style = "Underline"
unfocused_hollow = false

[colors]
draw_bold_text_with_bright_colors = false
transparent_background_colors = true
